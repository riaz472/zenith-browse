workflows:
  android-capacitor:
    name: Zenith Browse Android APK Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Next.js Static Export Build
         script: npm run build
      - name: Initialize Capacitor and Android Platform
        script: |
          npx cap init "Zenith Browse" "com.riaz.zenithbrowse" --web-dir=out
          npx cap add android
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
