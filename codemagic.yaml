workflows:
  android-capacitor:
    name: Zenith Browse Android APK Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      node: latest
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Next.js Static Export Build
        script: npm run build
      - name: Sync Web Assets to Android
        script: npx @capacitor/cli sync
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
