workflows:
  android-capacitor:
    name: Zenith Browse Android APK Build
    instance_type: linux_x86_64
    max_build_duration: 60
    environment:
      node: latest
      java: 17 # Yeh Linux par Java 17 select karne ka 100% sahi aur official tareeqa hai
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Next.js Static Export Build
        script: |
          npm run build
      - name: Sync Web Assets to Android
        script: |
          npx @capacitor/cli sync android
      - name: Build Android Debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
